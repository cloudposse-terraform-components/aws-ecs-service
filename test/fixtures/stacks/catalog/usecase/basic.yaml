components:
  terraform:
    ecs-service/basic:
      metadata:
        component: target
      vars:
        enabled: true
        ecs_cluster_name: ecs-cluster
        cluster_attributes: [platform]
        use_lb: false
        containers:
          service:
            name: app
            image: nginx:stable
            memory: 512
            cpu: 256
            port_mappings:
              - containerPort: 80
                hostPort: 80
                protocol: tcp
            # Exercises the `templatestring()` substitution in `local.env_map_subst`.
            # `${stage}`, `${namespace}` must resolve to values from `module.this`.
            map_environment:
              STAGE_NAME: "${stage}"
              NAMESPACE_NAME: "${namespace}"
              SERVICE_NAME: "${name}"
        task:
          # this places the task in the public subnet
          assign_public_ip: true # required for pulling public image since this is fargate
          circuit_breaker_deployment_enabled: true
          circuit_breaker_rollback_enabled: true
          deployment_controller_type: ECS
          desired_count: 1
          ignore_changes_desired_count: true
          ignore_changes_task_definition: false
          launch_type: FARGATE
          network_mode: awsvpc
          propagate_tags: SERVICE
          task_cpu: 1024
          task_memory: 2048
          wait_for_steady_state: true
        custom_security_group_rules:
          - type: ingress
            protocol: tcp
            from_port: 80
            to_port: 80
            cidr_blocks: ["172.16.0.0/16"]
            description: Allow HTTP from VPC
